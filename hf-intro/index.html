<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloomcore · Hero Background</title>
    <style>
        html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    </style>
</head>
<body>

<div data-composition-id="intro"
     data-width="1920"
     data-height="1080"
     data-start="0"
     data-duration="20">

    <div id="content"
         class="clip"
         data-start="0"
         data-duration="20"
         data-track-index="0">

        <div class="bg-base"></div>
        <canvas id="field" width="1920" height="1080"></canvas>
        <div class="grain"></div>
        <div class="vignette"></div>
    </div>

    <style>
        [data-composition-id="intro"] {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
        }

        [data-composition-id="intro"] #content {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        [data-composition-id="intro"] .bg-base {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 35% 55%, #333333 0%, #1d1d1d 60%, #121212 100%);
            z-index: 0;
        }

        [data-composition-id="intro"] #field {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        [data-composition-id="intro"] .grain {
            position: absolute;
            inset: -10%;
            width: 120%;
            height: 120%;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch' seed='7'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>");
            background-size: 240px 240px;
            mix-blend-mode: overlay;
            opacity: 0.18;
            pointer-events: none;
            z-index: 2;
        }

        [data-composition-id="intro"] .vignette {
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 10vw 2vw rgba(0, 0, 0, 0.6);
            background:
                radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 3;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
        window.__timelines = window.__timelines || {};

        // ------- deterministic flow field ---------------------------------
        const W = 1920, H = 1080;
        const DURATION = 20;
        const OMEGA = (2 * Math.PI) / DURATION;

        const N = 280;
        const LINK_DIST = 195;
        const LINK_DIST_SQ = LINK_DIST * LINK_DIST;
        const CLOSE_DIST = 75;
        const CLOSE_DIST_SQ = CLOSE_DIST * CLOSE_DIST;

        function mulberry32(seed) {
            return function () {
                seed = (seed + 0x6D2B79F5) | 0;
                let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }
        const rand = mulberry32(1729);

        // Particles have fixed seed positions + periodic sinusoidal drift.
        // pos(t) is pure f(t) → timeline is fully seekable / deterministic.
        const particles = [];
        for (let i = 0; i < N; i++) {
            particles.push({
                bx: rand() * W,
                by: rand() * H,
                ax: 40 + rand() * 90,
                ay: 30 + rand() * 70,
                px: rand() * Math.PI * 2,
                py: rand() * Math.PI * 2,
                fx: 1 + Math.floor(rand() * 3),
                fy: 1 + Math.floor(rand() * 3),
                size: 2.2 + rand() * 1.8
            });
        }

        const canvas = document.getElementById('field');
        const ctx = canvas.getContext('2d');

        // Scratch array for positions — reused across frames to avoid alloc.
        const px = new Float32Array(N);
        const py = new Float32Array(N);

        function drawField(t) {
            for (let i = 0; i < N; i++) {
                const p = particles[i];
                px[i] = p.bx + Math.sin(p.px + OMEGA * p.fx * t) * p.ax;
                py[i] = p.by + Math.cos(p.py + OMEGA * p.fy * t) * p.ay;
            }

            ctx.clearRect(0, 0, W, H);

            // Links between nearby particles — distance-faded.
            ctx.lineWidth = 1.5;
            for (let i = 0; i < N; i++) {
                const xi = px[i], yi = py[i];
                for (let j = i + 1; j < N; j++) {
                    const dx = xi - px[j];
                    const dy = yi - py[j];
                    const d2 = dx * dx + dy * dy;
                    if (d2 < LINK_DIST_SQ) {
                        const d = Math.sqrt(d2);
                        const a = 1 - d / LINK_DIST;
                        if (d2 < CLOSE_DIST_SQ) {
                            // Close-pair accent: very subtle brand-green tint.
                            ctx.strokeStyle = 'rgba(127, 255, 159, ' + (a * 0.48).toFixed(3) + ')';
                        } else {
                            ctx.strokeStyle = 'rgba(240, 240, 240, ' + (a * a * 0.38).toFixed(3) + ')';
                        }
                        ctx.beginPath();
                        ctx.moveTo(xi, yi);
                        ctx.lineTo(px[j], py[j]);
                        ctx.stroke();
                    }
                }
            }

            // Particles — soft dots.
            ctx.fillStyle = 'rgba(240, 240, 240, 0.8)';
            for (let i = 0; i < N; i++) {
                ctx.beginPath();
                ctx.arc(px[i], py[i], particles[i].size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ------- timeline -------------------------------------------------
        const driver = { t: 0 };
        const tl = gsap.timeline({ paused: true });

        // Single ease:'none' tween from 0 → DURATION that re-renders the
        // canvas on every update. Works on seek because onUpdate fires
        // whenever GSAP evaluates the tween.
        tl.to(driver, {
            t: DURATION,
            duration: DURATION,
            ease: 'none',
            onUpdate: () => drawField(driver.t)
        }, 0);

        // Grain shift — stepped ease for staccato film-grain feel.
        tl.to('[data-composition-id="intro"] .grain', {
            backgroundPosition: '840px 540px',
            duration: DURATION,
            ease: 'steps(45)'
        }, 0);

        // First frame — so the canvas isn't blank before the tween first fires.
        drawField(0);

        window.__timelines['intro'] = tl;

        // Standalone browser preview (iframe embed): loop forever when there's
        // no HyperFrames runtime driving playback.
        if (typeof window.__hyperframes === 'undefined') {
            window.addEventListener('load', () => {
                tl.eventCallback('onComplete', () => tl.restart());
                tl.play(0);
            });
        }
    </script>
</div>

</body>
</html>
