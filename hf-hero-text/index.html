<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloomcore · Hero Text Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* Transparent body is REQUIRED for HF to render WebM with alpha.
           If body has an opaque bg (even #000), captured frames come out
           yuv420p instead of yuva420p and the overlay will hide the hero. */
        html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
    </style>
</head>
<body>

<div data-composition-id="hero-text"
     data-width="1920"
     data-height="1080"
     data-start="0"
     data-duration="5">

    <div id="content"
         class="clip"
         data-start="0"
         data-duration="5"
         data-track-index="0">

        <div class="scene-content">
            <h1 class="headline">
                <span class="w">Change</span>
                <span class="w">the</span>
                <span class="w">model</span>
                <span class="w">&mdash;</span>
                <span class="w">everything</span>
                <span class="w">downstream</span>
                <span class="w">updates.</span>
            </h1>
            <p class="subhead">
                <span class="w">Polaris</span>
                <span class="w">cascades</span>
                <span class="w">a</span>
                <span class="w">model</span>
                <span class="w">change</span>
                <span class="w">through</span>
                <span class="w">FEA,</span>
                <span class="w">Eurocode</span>
                <span class="w">compliance</span>
                <span class="w">and</span>
                <span class="w">auditable</span>
                <span class="w">calculation</span>
                <span class="w">reports</span>
                <span class="w">&mdash;</span>
                <span class="w">in</span>
                <span class="w">minutes.</span>
            </p>
            <!-- Invisible spacer reserving the vertical real estate where the
                 live site's two CTA buttons sit (46px button row + 20px
                 margin-top = 66px). Makes overlay <p> bottom line up with
                 real <p> bottom at handoff. -->
            <div class="button-spacer" aria-hidden="true"></div>
        </div>
    </div>

    <style>
        [data-composition-id="hero-text"] {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        [data-composition-id="hero-text"] #content {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* The overlay element in index.html is positioned + sized to exactly
           match .hero-content (bottom: 80px, left: 60px, max-width: 700px,
           aspect-ratio 16/9). Inside that ~700×394 display box the 1920×1080
           composition scales by ~0.365 (700/1920), so for DISPLAY sizes to
           match real CSS:
               headline 56px / 0.365 ≈ 153px ≈ 8vw
               subhead  22px / 0.365 ≈  60px ≈ 3.1vw
           A button-spacer reserves the 76px real-button footprint: button
           row is 56px (15px padding + 25.6px line-height × 16px font + 15px
           padding) plus 20px margin-top.
               76px / 0.365 ≈ 208px ≈ 11vw
           Everything flex-ends to the bottom, matching the live layout —
           so overlay <p> bottom lands on top of real <p> bottom at handoff. */
        [data-composition-id="hero-text"] .scene-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            width: 100%;
            height: 100%;
            padding: 0;
            box-sizing: border-box;
        }

        /* letter-spacing and line-height values match styles.css exactly
           (h1 has -0.5px absolute letter-spacing → -0.5/56 ≈ -0.0089em at
           56px display; body's line-height 1.6 is inherited by the p). */
        [data-composition-id="hero-text"] .headline {
            font-size: 8vw;         /* 8 × 19.2 × (700/1920) = 56.00 px display */
            font-weight: 700;
            letter-spacing: -0.0089em;
            line-height: 1.1;
            color: #FFD700;
            margin: 0;
            max-width: 100%;
        }

        [data-composition-id="hero-text"] .subhead {
            font-size: 3.086vw;     /* 3.086 × 19.2 × (700/1920) = 21.60 px display */
            font-weight: 400;
            line-height: 1.6;
            color: #ffffff;
            margin: 0;
            max-width: 100%;
        }

        [data-composition-id="hero-text"] .button-spacer {
            width: 100%;
            height: 11vw;
            flex-shrink: 0;
        }

        [data-composition-id="hero-text"] .w {
            display: inline-block;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });

        // Headline — word stagger, power3.out for a confident reveal
        tl.from('[data-composition-id="hero-text"] .headline .w', {
            y: 40,
            opacity: 0,
            duration: 0.8,
            ease: 'power3.out',
            stagger: 0.09
        }, 0.3);

        // Subhead — tighter stagger, gentler ease. Starts after the
        // headline has settled; brought forward since there's no longer
        // a mid-headline sketchout beat to wait through.
        tl.from('[data-composition-id="hero-text"] .subhead .w', {
            y: 20,
            opacity: 0,
            duration: 0.55,
            ease: 'power2.out',
            stagger: 0.035
        }, 2.0);

        // Final fade-out — final-scene rule; overlay handoff to real DOM text.
        tl.to('[data-composition-id="hero-text"] #content', {
            opacity: 0,
            duration: 0.6,
            ease: 'power2.in'
        }, 4.3);

        window.__timelines['hero-text'] = tl;

        // Standalone browser preview (iframe embed / direct open): play on load
        if (typeof window.__hyperframes === 'undefined') {
            window.addEventListener('load', () => tl.play(0));
        }
    </script>
</div>

</body>
</html>
